<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JavaScript Equalizer</title>
  <style>
    :root {
      --bg: #0a0f16;
      --surface: #111822;
      --surface-2: #171f2c;
      --line: #232d3d;
      --text: #f3f6fb;
      --muted: #93a0b4;
      --accent: #7daeff;
      --accent-2: #4b84f2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(125, 174, 255, 0.16), transparent 28%),
        linear-gradient(180deg, #0a0f16, #070b11 60%);
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
      display: grid;
      gap: 18px;
    }

    .hero,
    .card {
      background: linear-gradient(180deg, rgba(17, 24, 34, 0.96), rgba(23, 31, 44, 0.96));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    .hero {
      padding: 24px;
      display: grid;
      gap: 10px;
    }

    .hero h1,
    .hero p,
    .card h2,
    .card p {
      margin: 0;
    }

    .hero p,
    .muted {
      color: var(--muted);
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }

    .card {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    input[type="file"],
    select,
    button,
    audio {
      font: inherit;
    }

    select,
    button {
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 10px 14px;
      background: var(--surface-2);
      color: var(--text);
    }

    button {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      border: 0;
      cursor: pointer;
    }

    audio {
      width: 100%;
      filter: hue-rotate(180deg) saturate(0.76);
    }

    .bands {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .band {
      display: grid;
      gap: 10px;
      justify-items: center;
      background: rgba(13, 20, 29, 0.95);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 8px;
    }

    .band-label,
    .band-value {
      font-size: 12px;
      color: var(--muted);
    }

    .band-slider {
      writing-mode: bt-lr;
      -webkit-appearance: slider-vertical;
      width: 20px;
      height: 180px;
      accent-color: var(--accent);
    }

    #visualizer {
      width: 100%;
      height: 220px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #0d141d;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .bands { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .bands { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>JavaScript Equalizer</h1>
      <p>Standalone 10-band Web Audio equalizer with presets, live band control, and a simple spectrum visualizer.</p>
      <div id="status" class="muted"></div>
    </section>

    <section class="layout">
      <article class="card">
        <h2>Controls</h2>
        <div class="toolbar">
          <input id="file-input" type="file" accept="audio/*">
          <select id="preset-select"></select>
          <button id="reset-button" type="button">Reset</button>
        </div>
        <audio id="audio-player" controls preload="metadata"></audio>
        <div id="eq-controls" class="bands"></div>
      </article>

      <article class="card">
        <h2>Visualizer</h2>
        <p class="muted">Playback starts the Web Audio graph and analyzer automatically.</p>
        <canvas id="visualizer" width="420" height="220"></canvas>
      </article>
    </section>
  </main>

  <script src="./equalizer.js"></script>
</body>
</html>
